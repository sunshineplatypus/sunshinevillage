<!DOCTYPE html>
<html>
<head>
  <title>Sunshine Village</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 700px;
      padding: 20px;
    }
    h1 {
      font-size: 3.2em;
      margin-bottom: 0.2em;
    }
    h2 {
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 2em;
    }
    .tagline {
      font-size: 1.4em;
      margin-bottom: 2em;
      opacity: 0.9;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }
    .button:hover {
      background: rgba(255,255,255,0.1);
    }
    .footer {
      margin-top: 40px;
      font-size: 0.9em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sunshine Village 🌞</h1>
    <h2>a regenerative community of play</h2>

    <div class="tagline">
      A place to live, create, connect, and grow in harmony with each other and the Earth.
    </div>

    <a class="button" href="#">
      enter the village →
    </a>

    <div class="footer">
      coming into form • stay tuned
    </div>
  </div>
</body>
</html>
