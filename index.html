<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sunshine village</title>

  <style>
    :root {
      --text: #ff8a00;
      --text-soft: rgba(255, 138, 0, 0.8);

      --line: rgba(255, 170, 0, 0.2);

      --panel: rgba(255, 252, 235, 0.5);
      --panel-strong: rgba(255, 253, 245, 0.75);

      --button: #ffe066;
      --button-hover: #ffd43b;
      --button-text: #c26b00;

      --shadow: rgba(255, 170, 0, 0.15);

      --success: #6b8e00;
      --error: #cc4400;
      --info: #aa6600;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;

      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.95) 0%, rgba(255,255,200,0.95) 18%, rgba(255,240,120,0.75) 40%, rgba(255,220,60,0.35) 60%, rgba(255,210,40,0.1) 75%, transparent 85%),
        radial-gradient(circle at 80% 10%, rgba(255,180,60,0.15), transparent 40%),
        radial-gradient(circle at 20% 90%, rgba(255,200,80,0.12), transparent 40%),
        linear-gradient(
          to bottom,
          #ffffff 0%,
          #fffef2 15%,
          #fff9cc 40%,
          #fff099 70%,
          #ffe066 100%
        );

      animation: skyPulse 14s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 25% 80%, rgba(255,255,255,0.35), transparent 30%),
        radial-gradient(circle at 75% 20%, rgba(255,230,150,0.25), transparent 30%);
      animation: driftA 20s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 30%, rgba(255,200,80,0.15), transparent 30%);
      animation: driftB 18s ease-in-out infinite alternate;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      width: calc(100% - 32px);
      padding: 40px 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(to bottom, var(--panel-strong), var(--panel));
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.8rem, 7vw, 4.6rem);
      line-height: 0.95;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: -0.04em;
      color: #ff8a00;
    }

    h2 {
      margin: 0 0 24px;
      font-size: clamp(1.1rem, 2.6vw, 1.5rem);
      font-weight: 500;
      color: var(--text-soft);
      text-transform: lowercase;
    }

    .tagline {
      max-width: 620px;
      margin: 0 auto 28px;
      font-size: clamp(1.1rem, 2.4vw, 1.35rem);
      line-height: 1.55;
      color: var(--text);
      text-transform: lowercase;
    }

    .signup-wrap {
      max-width: 560px;
      margin: 0 auto 18px;
    }

    .signup-label {
      display: block;
      margin-bottom: 12px;
      font-size: 1rem;
      color: var(--text-soft);
      text-transform: lowercase;
    }

    .signup-form {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .signup-input {
      flex: 1 1 280px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 170, 0, 0.25);
      border-radius: 14px;
      background: rgba(255,255,250,0.95);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .signup-input::placeholder {
      color: rgba(255, 140, 0, 0.5);
    }

    .signup-input:focus {
      border-color: rgba(255, 180, 0, 0.6);
      box-shadow: 0 0 0 4px rgba(255, 220, 60, 0.3);
    }

    .button {
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: var(--button);
      color: var(--button-text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: lowercase;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(255, 170, 0, 0.25);
    }

    .button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .signup-note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: rgba(255, 140, 0, 0.6);
    }

    .status {
      min-height: 1.25rem;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
    .status.info { color: var(--info); }

    .footer {
      margin-top: 28px;
      font-size: 0.92rem;
      color: rgba(255, 140, 0, 0.55);
    }

    @keyframes skyPulse {
      0% { filter: saturate(1) brightness(1); }
      100% { filter: saturate(1.08) brightness(1.03); }
    }

    @keyframes driftA {
      0% { transform: translateY(0); }
      100% { transform: translateY(-10px); }
    }

    @keyframes driftB {
      0% { transform: translateY(0); }
      100% { transform: translateY(8px); }
    }

    @media (max-width: 640px) {
      .container { padding: 28px 18px; }
      .signup-form { flex-direction: column; }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>sunshine village</h1>
    <h2>a regenerative community of play</h2>

    <div class="tagline">
      a place to live, create, connect, and grow in harmony with each other and the earth
    </div>

    <div class="signup-wrap">
      <label class="signup-label">
        get occasional updates as the village comes into form
      </label>

      <form class="signup-form" id="signup-form">
        <input class="signup-input" id="email" type="email" placeholder="your email" required />
        <button class="button" type="submit">join updates</button>
      </form>

      <div class="signup-note">gentle updates only</div>
      <div class="status" id="status"></div>
    </div>

    <div class="footer">coming into form</div>
  </main>

  <script>
    const form = document.getElementById('signup-form');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'joining...';
      statusEl.className = 'status info';

      const email = document.getElementById('email').value;

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        form.reset();

        if (data.message === 'already subscribed') {
          statusEl.textContent = 'already subscribed';
        } else {
          statusEl.textContent = 'you are on the list';
        }

        statusEl.className = 'status success';
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status error';
      }
    });
  </script>
</body>
</html>
