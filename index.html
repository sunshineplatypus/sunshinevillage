<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sunshine village</title>
  <style>
    :root {
      --text: #4a2a00;
      --text-soft: rgba(74, 42, 0, 0.78);
      --line: rgba(122, 76, 0, 0.18);
      --panel: rgba(255, 248, 220, 0.38);
      --panel-strong: rgba(255, 250, 232, 0.62);
      --button: #f6b100;
      --button-hover: #e5a300;
      --white: #fffdf6;
      --shadow: rgba(160, 108, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 247, 179, 0.95) 0%, rgba(255, 240, 140, 0.88) 14%, rgba(255, 224, 102, 0.68) 28%, rgba(255, 205, 64, 0.42) 40%, rgba(255, 189, 28, 0.18) 48%, rgba(255, 179, 0, 0) 56%),
        linear-gradient(
          to bottom,
          #fffdf2 0%,
          #fff7cf 16%,
          #ffef9c 34%,
          #ffe06e 54%,
          #ffd34d 72%,
          #ffc933 100%
        );
      animation: skyPulse 16s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 22% 82%, rgba(255,255,255,0.34), transparent 28%),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,0.22), transparent 22%),
        radial-gradient(circle at 65% 70%, rgba(255,255,255,0.16), transparent 24%);
      animation: driftA 24s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 252, 230, 0.42), transparent 20%),
        radial-gradient(circle at 40% 30%, rgba(255, 247, 190, 0.22), transparent 28%);
      animation: driftB 18s ease-in-out infinite alternate;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      width: calc(100% - 32px);
      padding: 36px 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(to bottom, var(--panel-strong), var(--panel));
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 60px var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.5rem, 7vw, 4.4rem);
      line-height: 0.95;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: -0.04em;
    }

    h2 {
      margin: 0 0 24px;
      font-size: clamp(1.05rem, 2.6vw, 1.45rem);
      font-weight: 450;
      color: var(--text-soft);
      text-transform: lowercase;
    }

    .tagline {
      max-width: 620px;
      margin: 0 auto 28px;
      font-size: clamp(1.08rem, 2.4vw, 1.34rem);
      line-height: 1.55;
      color: var(--text);
      text-transform: lowercase;
    }

    .signup-wrap {
      max-width: 560px;
      margin: 0 auto 18px;
    }

    .signup-label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.98rem;
      color: var(--text-soft);
      text-transform: lowercase;
    }

    .signup-form {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .signup-input {
      flex: 1 1 280px;
      min-width: 220px;
      padding: 14px 16px;
      border: 1px solid rgba(122, 76, 0, 0.16);
      border-radius: 14px;
      background: rgba(255, 253, 244, 0.88);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .signup-input::placeholder {
      color: rgba(74, 42, 0, 0.48);
      text-transform: lowercase;
    }

    .signup-input:focus {
      border-color: rgba(200, 136, 0, 0.42);
      box-shadow: 0 0 0 4px rgba(255, 202, 40, 0.22);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: var(--button);
      color: #5a3500;
      font-size: 1rem;
      font-weight: 650;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      text-transform: lowercase;
      box-shadow: 0 8px 24px rgba(210, 145, 0, 0.18);
    }

    .button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(210, 145, 0, 0.22);
    }

    .button:active {
      transform: translateY(0);
    }

    .signup-note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: rgba(74, 42, 0, 0.62);
      text-transform: lowercase;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.92rem;
      color: rgba(74, 42, 0, 0.58);
      text-transform: lowercase;
    }

    @keyframes skyPulse {
      0% {
        filter: saturate(1) brightness(1);
      }
      100% {
        filter: saturate(1.06) brightness(1.03);
      }
    }

    @keyframes driftA {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(0, -10px, 0) scale(1.03);
      }
    }

    @keyframes driftB {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate3d(0, 8px, 0) scale(1.02);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 28px 18px;
        border-radius: 22px;
      }

      .signup-form {
        flex-direction: column;
      }

      .button,
      .signup-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>sunshine village</h1>
    <h2>a regenerative community of play</h2>

    <div class="tagline">
      a place to live, create, connect, and grow in harmony with each other and the earth
    </div>

    <div class="signup-wrap">
      <label class="signup-label" for="email">
        get occasional updates as the village comes into form
      </label>

      <form class="signup-form" action="#" method="post">
        <input
          class="signup-input"
          id="email"
          name="email"
          type="email"
          placeholder="your email"
          required
        />
        <button class="button" type="submit">join updates</button>
      </form>

      <div class="signup-note">
        gentle updates only
      </div>
    </div>

    <div class="footer">
      coming into form
    </div>
  </main>
</body>
</html>
