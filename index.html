<!DOCTYPE html>
<html>
<head>
  <title>sunshine village</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(
        to bottom,
        #fff3c4,
        #ffd6a5,
        #ffadad,
        #cdb4db,
        #a2d2ff
      );
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3.2em;
      margin-bottom: 0.2em;
      text-transform: lowercase;
    }

    h2 {
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 2em;
      text-transform: lowercase;
    }

    .tagline {
      font-size: 1.4em;
      margin-bottom: 2em;
      opacity: 0.9;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      color: #1e293b;
      text-decoration: none;
      transition: 0.2s;
      text-transform: lowercase;
    }

    .button:hover {
      background: rgba(0,0,0,0.05);
    }

    .footer {
      margin-top: 40px;
      font-size: 0.9em;
      opacity: 0.6;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>sunshine village 🌞</h1>
    <h2>a regenerative community of play</h2>

    <div class="tagline">
      a place to live, create, connect, and grow in harmony with each other and the earth
    </div>

    <a class="button" href="#">
      enter the village →
    </a>

    <div class="footer">
      coming into form • stay tuned
    </div>
  </div>
</body>
</html>
